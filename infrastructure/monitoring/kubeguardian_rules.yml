groups:
  - name: kubeguardian.rules
    rules:
      # High CPU Usage Alert
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: performance
        annotations:
          summary: "High CPU usage detected in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} CPU usage is above 80% for more than 5 minutes"
          runbook_url: "https://kubeguardian.example.com/runbooks/cpu-usage"

      # Critical CPU Usage Alert
      - alert: CriticalCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: kubeguardian
          category: performance
        annotations:
          summary: "Critical CPU usage in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} CPU usage is above 95% for more than 2 minutes"
          runbook_url: "https://kubeguardian.example.com/runbooks/cpu-usage"

      # High Memory Usage Alert
      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: performance
        annotations:
          summary: "High memory usage detected in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} memory usage is above 85% of its limit"
          runbook_url: "https://kubeguardian.example.com/runbooks/memory-usage"

      # Critical Memory Usage Alert
      - alert: CriticalMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: kubeguardian
          category: performance
        annotations:
          summary: "Critical memory usage in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} memory usage is above 95% of its limit"
          runbook_url: "https://kubeguardian.example.com/runbooks/memory-usage"

      # Pod Crash Looping
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          service: kubeguardian
          category: availability
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.pod }} has restarted more than 0 times in the last 15 minutes"
          runbook_url: "https://kubeguardian.example.com/runbooks/pod-crashes"

      # Pod Not Ready
      - alert: PodNotReady
        expr: kube_pod_status_ready{condition="true"} == 0
        for: 10m
        labels:
          severity: warning
          service: kubeguardian
          category: availability
        annotations:
          summary: "Pod {{ $labels.pod }} is not ready"
          description: "Pod {{ $labels.pod }} has been not ready for more than 10 minutes"
          runbook_url: "https://kubeguardian.example.com/runbooks/pod-readiness"

      # Node Not Ready
      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          service: kubeguardian
          category: infrastructure
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been not ready for more than 5 minutes"
          runbook_url: "https://kubeguardian.example.com/runbooks/node-readiness"

      # High Disk Usage
      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: storage
        annotations:
          summary: "High disk usage on node {{ $labels.node }}"
          description: "Node {{ $labels.node }} disk usage is above 85%"
          runbook_url: "https://kubeguardian.example.com/runbooks/disk-usage"

      # Critical Disk Usage
      - alert: CriticalDiskUsage
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: kubeguardian
          category: storage
        annotations:
          summary: "Critical disk usage on node {{ $labels.node }}"
          description: "Node {{ $labels.node }} disk usage is above 95%"
          runbook_url: "https://kubeguardian.example.com/runbooks/disk-usage"

      # Network Errors
      - alert: NetworkErrors
        expr: rate(container_network_receive_errors_total[5m]) + rate(container_network_transmit_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: network
        annotations:
          summary: "Network errors detected in pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is experiencing network errors"
          runbook_url: "https://kubeguardian.example.com/runbooks/network-errors"

      # Security Vulnerability Alert
      - alert: SecurityVulnerability
        expr: kubeguardian_vulnerabilities{severity="critical"} > 0
        for: 0m
        labels:
          severity: critical
          service: kubeguardian
          category: security
        annotations:
          summary: "Critical security vulnerabilities detected"
          description: "{{ $value }} critical vulnerabilities found in cluster {{ $labels.cluster_id }}"
          runbook_url: "https://kubeguardian.example.com/runbooks/security-vulnerabilities"

      # High Risk Score
      - alert: HighRiskScore
        expr: kubeguardian_cluster_risk_score > 80
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: security
        annotations:
          summary: "High security risk score detected"
          description: "Cluster {{ $labels.cluster_id }} has risk score of {{ $value }}"
          runbook_url: "https://kubeguardian.example.com/runbooks/risk-score"

      # Application Down
      - alert: ApplicationDown
        expr: up{job="kubeguardian-backend"} == 0 or up{job="kubeguardian-ai-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: kubeguardian
          category: availability
        annotations:
          summary: "KubeGuardian service is down"
          description: "{{ $labels.job }} service has been down for more than 1 minute"
          runbook_url: "https://kubeguardian.example.com/runbooks/service-availability"

      # High Response Time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: performance
        annotations:
          summary: "High API response time detected"
          description: "95th percentile response time is {{ $value }}s"
          runbook_url: "https://kubeguardian.example.com/runbooks/response-time"

      # Error Rate High
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100 > 5
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: performance
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% over the last 5 minutes"
          runbook_url: "https://kubeguardian.example.com/runbooks/error-rate"

      # Database Connection Issues
      - alert: DatabaseConnectionIssues
        expr: mongodb_connections{state="failed"} > 10
        for: 2m
        labels:
          severity: critical
          service: kubeguardian
          category: database
        annotations:
          summary: "Database connection issues detected"
          description: "{{ $value }} failed database connections in the last 2 minutes"
          runbook_url: "https://kubeguardian.example.com/runbooks/database-connections"

      # Redis Memory High
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: kubeguardian
          category: cache
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value }}%"
          runbook_url: "https://kubeguardian.example.com/runbooks/redis-memory"
