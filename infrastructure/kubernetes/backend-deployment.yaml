apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeguardian-backend
  namespace: kubeguardian
  labels:
    app: kubeguardian-backend
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeguardian-backend
  template:
    metadata:
      labels:
        app: kubeguardian-backend
        component: backend
    spec:
      containers:
      - name: backend
        image: kubeguardian-backend:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kubeguardian-secrets
              key: mongodb-uri
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: kubeguardian-config
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: kubeguardian-secrets
              key: jwt-secret
        - name: AI_SERVICE_URL
          value: "http://kubeguardian-ai-service:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kubeguardian-backend
  namespace: kubeguardian
  labels:
    app: kubeguardian-backend
    component: backend
spec:
  selector:
    app: kubeguardian-backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
