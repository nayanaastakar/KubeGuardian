apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeguardian-ai-service
  namespace: kubeguardian
  labels:
    app: kubeguardian-ai-service
    component: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeguardian-ai-service
  template:
    metadata:
      labels:
        app: kubeguardian-ai-service
        component: ai-service
    spec:
      containers:
      - name: ai-service
        image: kubeguardian-ai-service:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kubeguardian-secrets
              key: openai-api-key
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: kubeguardian-secrets
              key: mongodb-uri
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kubeguardian-ai-service
  namespace: kubeguardian
  labels:
    app: kubeguardian-ai-service
    component: ai-service
spec:
  selector:
    app: kubeguardian-ai-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
